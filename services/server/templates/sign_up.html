{% extends "base.html" %}

{% block content %}
  <section class="auth-layout">
    <div class="auth-panel">
      <p class="eyebrow">New Analyst</p>
      <h1>Sign Up</h1>
      <p class="page-summary">Create an account for the Pocket SIEM console.</p>

      <form method="post" action="{{ url_for('auth.sign_up') }}" class="auth-form">
        <div class="field-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required>
        </div>

        <div class="field-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="new-password" required>
        </div>

        <div class="form-actions">
          <button type="submit" class="button-primary">Sign Up</button>
          <a href="{{ url_for('auth.log_in') }}" class="button-link">Log in instead</a>
        </div>
      </form>
    </div>
  </section>
{% endblock %}
